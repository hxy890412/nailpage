<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Art Studio | 預約系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff9f9; }
        
        /* 膠囊頁籤樣式 */
        .nav-tag { padding: 8px 18px; border-radius: 50px; font-size: 14px; font-weight: 500; transition: all 0.3s; border: 1px solid #fce7f3; color: #9d174d; background: white; white-space: nowrap; }
        .nav-tag.active { background: #be185d; color: white; border-color: #be185d; box-shadow: 0 4px 12px rgba(190, 24, 93, 0.2); }

        /* 月曆樣式優化 */
        .calendar-card { background: white; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid rgba(255,192,203,0.3); }
        .calendar-day { min-height: 100px; border-radius: 12px; transition: all 0.2s; position: relative; border: 1px solid #fff5f5; }
        .calendar-day.has-slots { background: #fffafb; cursor: pointer; }
        .calendar-day.has-slots:active { transform: scale(0.95); background: #fdf2f8; }
        .day-num { font-size: 13px; font-weight: 600; color: #4b5563; }
        
        /* 時段標籤 */
        .slot-pill { font-size: 9px; background: #be185d; color: white; border-radius: 4px; padding: 1px 4px; margin-top: 2px; text-align: center; width: 90%; font-weight: bold; }

        .past-day { opacity: 0.3; cursor: default; background: #f9fafb !important; }
        .today-mark { border: 2px solid #be185d !important; }

        /* 底部彈窗 */
        .modal-up { animation: slideUp 0.4s cubic-bezier(0, 0.55, 0.45, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        /* 隱藏捲動條但保有功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-12">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-pink-50">
        <div onclick="location.reload()" class="flex items-center gap-2 cursor-pointer group">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-rose-700 rounded-xl flex items-center justify-center text-white shadow-lg group-hover:rotate-12 transition-transform">
                <i class="fa-solid fa-sparkles text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-gray-800 tracking-tight leading-none text-lg">Nail Studio</h1>
                <p class="text-[10px] text-pink-500 font-bold tracking-widest uppercase">Professional Art</p>
            </div>
        </div>
        <img id="user-avatar" class="w-10 h-10 rounded-full border-2 border-pink-100 hidden shadow-sm">
    </header>

    <nav class="flex gap-3 px-6 py-4 overflow-x-auto no-scrollbar">
        <button onclick="switchPage('booking')" id="tab-booking" class="nav-tag active">預約時段</button>
        <button onclick="switchPage('styles')" id="tab-styles" class="nav-tag">款式介紹</button>
        <button onclick="switchPage('notices')" id="tab-notices" class="nav-tag">預約須知</button>
        </nav>

    <main class="max-w-md mx-auto px-4 mt-2">
        
        <section id="page-booking" class="page-content space-y-4">
            <div class="calendar-card p-5">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="current-month" class="text-xl font-bold text-gray-800"></h2>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                        <button onclick="changeMonth(1)" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                    </div>
                </div>
                
                <div class="grid grid-cols-7 text-center mb-4 text-xs font-bold text-gray-400 uppercase tracking-widest">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                
                <div id="calendar-grid" class="grid grid-cols-7 gap-1">
                    </div>
            </div>
            
            <div class="flex justify-center gap-6 py-2">
                <div class="flex items-center gap-2 text-xs text-gray-500 font-medium">
                    <span class="w-3 h-3 rounded-full bg-pink-600"></span> 可預約
                </div>
                <div class="flex items-center gap-2 text-xs text-gray-500 font-medium">
                    <span class="w-3 h-3 rounded-full bg-gray-200"></span> 已約滿 / 休假
                </div>
            </div>
        </section>

        <section id="page-styles" class="page-content hidden">
            <div id="styles-grid" class="grid grid-cols-2 gap-4">
                </div>
        </section>

        <section id="page-notices" class="page-content hidden space-y-4">
            </section>

    </main>

    <div id="booking-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 modal-up shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h3 class="text-2xl font-bold text-gray-800">預約申請</h3>
                    <p class="text-pink-500 text-sm font-medium" id="display-date"></p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-400">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <form onsubmit="submitForm(event)" class="space-y-8">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
                        <i class="fa-regular fa-clock text-pink-500"></i> 1. 選擇時段
                    </label>
                    <div id="time-options" class="grid grid-cols-3 gap-3">
                        </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-palette text-pink-500"></i> 2. 選擇款式
                    </label>
                    <select id="form-style" required class="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold text-gray-700 ring-1 ring-gray-200 focus:ring-2 focus:ring-pink-500 transition-all">
                    </select>
                </div>

                <div class="flex items-center justify-between bg-pink-50/50 p-5 rounded-3xl border border-pink-100">
                    <div>
                        <p class="font-bold text-gray-800">需要卸甲</p>
                        <p class="text-xs text-pink-600">+ $200 元起</p>
                    </div>
                    <input type="checkbox" id="form-remove" class="w-7 h-7 accent-pink-600 rounded-lg">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">給美甲師的悄悄話 (選填)</label>
                    <textarea id="form-note" rows="2" class="w-full bg-gray-50 border-none rounded-2xl p-4 ring-1 ring-gray-200 focus:ring-2 focus:ring-pink-500" placeholder="例如：指甲有受損、需縮短..."></textarea>
                </div>

                <button type="submit" id="submit-btn" disabled class="w-full bg-gradient-to-r from-pink-600 to-rose-600 text-white py-5 rounded-3xl font-bold text-lg shadow-xl shadow-pink-200 opacity-50 disabled:cursor-not-allowed">
                    確認送出預約
                </button>
            </form>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyZ3P36Vvy-nxQ6AYd4UikdDNpG8xHq02bXqRXq6qwHXQ-jQD6h8BSz0bkeKzZs0Z5K/exec";
        const LIFF_ID = "2009547519-PsSaE7hv";
        
        let appData = { settings: [], styles: [], rules: [] };
        let currentViewDate = new Date();
        let selDate, selTime;

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) liff.login();
                const profile = await liff.getProfile();
                document.getElementById('user-avatar').src = profile.pictureUrl;
                document.getElementById('user-avatar').classList.remove('hidden');
            } catch (e) { console.log("LIFF Init Failed"); }
            fetchData();
        }

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?action=getAppData`);
                const data = await res.json();
                appData = data;
                renderStyles();
                renderRules();
                renderCalendar();
            } catch (e) { alert("資料載入失敗，請檢查網路連接"); }
        }

        // 渲染款式
        function renderStyles() {
            const grid = document.getElementById('styles-grid');
            grid.innerHTML = appData.styles.map(s => `
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-pink-50">
                    <img src="${s.圖片網址}" class="w-full h-40 object-cover">
                    <div class="p-3 text-center">
                        <p class="font-bold text-sm text-gray-800 truncate">${s.名稱}</p>
                        <p class="text-pink-600 font-bold text-xs mt-1">$${s.價格}</p>
                    </div>
                </div>
            `).join('');
            document.getElementById('form-style').innerHTML = `<option value="" disabled selected>請選擇心儀款式</option>` + 
                appData.styles.map(s => `<option value="${s.名稱}">${s.名稱} ($${s.價格})</option>`).join('');
        }

        // 渲染規則
        function renderRules() {
            const container = document.getElementById('page-notices');
            container.innerHTML = appData.rules.map(r => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-pink-50">
                    <h4 class="font-bold text-pink-700 mb-2 flex items-center gap-2">
                        <i class="fa-solid fa-circle-exclamation"></i> ${r.標題}
                    </h4>
                    <p class="text-sm text-gray-600 leading-relaxed">${r.詳細內容}</p>
                </div>
            `).join('');
        }

        // 月曆邏輯核心
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthTitle = document.getElementById('current-month');
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            
            monthTitle.innerText = `${year}年 ${month + 1}月`;
            grid.innerHTML = "";

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toISOString().split('T')[0];

            // 空白格
            for (let j = 0; j < firstDay; j++) {
                grid.innerHTML += `<div class="calendar-day"></div>`;
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const match = appData.settings.find(s => s.formattedDate === dateStr);
                const slots = (match && match.availableSlots) ? match.availableSlots : [];
                
                const isPast = dateStr < todayStr;
                const isToday = dateStr === todayStr;
                const hasSlots = slots.length > 0;

                const dayEl = document.createElement('div');
                dayEl.className = `calendar-day flex flex-col items-center p-2 ${hasSlots && !isPast ? 'has-slots' : ''} ${isPast ? 'past-day' : ''} ${isToday ? 'today-mark' : ''}`;
                
                dayEl.innerHTML = `<span class="day-num">${i}</span>`;
                slots.forEach(time => {
                    dayEl.innerHTML += `<div class="slot-pill">${time}</div>`;
                });

                if (hasSlots && !isPast) {
                    dayEl.onclick = () => openModal(dateStr, slots);
                }
                grid.appendChild(dayEl);
            }
        }

        function changeMonth(step) {
            currentViewDate.setMonth(currentViewDate.getMonth() + step);
            renderCalendar();
        }

        function openModal(dStr, slots) {
            selDate = dStr; selTime = null;
            document.getElementById('display-date').innerText = `📅 預約日期：${dStr}`;
            const timeContainer = document.getElementById('time-options');
            
            timeContainer.innerHTML = slots.map(t => `
                <button type="button" onclick="selectTime('${t}', this)" 
                    class="time-btn py-4 rounded-2xl border-2 border-pink-50 text-gray-700 font-bold text-sm bg-gray-50 transition-all hover:bg-pink-50">
                    ${t}
                </button>
            `).join('');

            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').classList.add('opacity-50');
            document.getElementById('booking-modal').classList.remove('hidden');
        }

        function selectTime(t, el) {
            selTime = t;
            document.querySelectorAll('.time-btn').forEach(b => {
                b.classList.remove('bg-pink-600', 'text-white', 'border-pink-600', 'shadow-lg');
                b.classList.add('bg-gray-50', 'text-gray-700', 'border-pink-50');
            });
            el.classList.add('bg-pink-600', 'text-white', 'border-pink-600', 'shadow-lg');
            el.classList.remove('bg-gray-50', 'text-gray-700', 'border-pink-50');
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').classList.remove('opacity-50');
        }

        function closeModal() { document.getElementById('booking-modal').classList.add('hidden'); }

        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 傳送中...`;

            try {
                const profile = await liff.getProfile();
                const payload = {
                    action: 'submitBooking',
                    userId: profile.userId,
                    name: profile.displayName,
                    date: selDate,
                    time: selTime,
                    style: document.getElementById('form-style').value,
                    removeNails: document.getElementById('form-remove').checked ? "是" : "否",
                    note: document.getElementById('form-note').value
                };

                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                await liff.sendMessages([{ type: 'text', text: `✨ 收到新預約！\n🗓️ 日期：${selDate}\n⏰ 時間：${selTime}\n🎨 款式：${payload.style}\n💅 卸甲：${payload.removeNails}\n📝 備註：${payload.note || '無'}` }]);
                liff.closeWindow();
            } catch (err) {
                alert("預約成功！但訊息發送失敗，請自行確認。");
                liff.closeWindow();
            }
        }

        function switchPage(p) {
            document.querySelectorAll('.page-content').forEach(page => page.classList.add('hidden'));
            document.getElementById(`page-${p}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-tag').forEach(tag => tag.classList.remove('active'));
            document.getElementById(`tab-${p}`).classList.add('active');
            
            // 如果切換回預約，確保月曆更新
            if(p === 'booking') renderCalendar();
        }

        window.onload = init;
    </script>
</body>
</html>
