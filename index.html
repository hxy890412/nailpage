<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Art Studio | 預約看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #db2777; border-bottom: 3px solid #db2777; font-weight: bold; }
        /* 日曆格子：加高以容納三個時段 */
        .calendar-day { min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 6px 2px; border: 1px solid #f3f4f6; position: relative; }
        .day-num { font-size: 12px; font-weight: bold; color: #9ca3af; margin-bottom: 5px; }
        /* 時段小標籤樣式 */
        .slot-tag { width: 95%; font-size: 10px; margin-top: 3px; padding: 2px 0; text-align: center; border-radius: 6px; font-weight: bold; transition: all 0.2s; border: 1px solid transparent; }
        /* 狀態：可預約 (粉色按鈕) */
        .slot-available { background-color: #fdf2f8; color: #db2777; border-color: #fbcfe8; cursor: pointer; }
        .slot-available:active { background-color: #db2777; color: white; }
        /* 狀態：已約滿/休假 (灰色/紅色) */
        .slot-full { background-color: #f3f4f6; color: #9ca3af; }
        .slot-off { background-color: #fef2f2; color: #f87171; border-color: #fee2e2; }
        
        .calendar-day.empty { background-color: #fafafa; }
        .calendar-day.today { border: 2px solid #db2777; border-radius: 8px; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 pb-10">

    <header class="bg-white px-5 py-3 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-pink-600 rounded-lg flex items-center justify-center text-white italic font-serif text-xl shadow-md">N</div>
            <span class="font-bold text-lg tracking-wider text-gray-800 uppercase">Nail Studio</span>
        </div>
        <img id="user-avatar" src="" class="w-10 h-10 rounded-full border-2 border-pink-100 hidden">
    </header>

    <nav class="bg-white border-b flex text-center font-medium sticky top-[60px] z-40">
        <button onclick="switchPage('booking')" id="tab-booking" class="flex-1 py-4 active-tab text-sm">預約看板</button>
        <button onclick="switchPage('notices')" id="tab-notices" class="flex-1 py-4 text-gray-500 text-sm">預約須知</button>
        <button onclick="switchPage('styles')" id="tab-styles" class="flex-1 py-4 text-gray-500 text-sm">款式介紹</button>
    </nav>

    <main class="max-w-md mx-auto p-3">
        <section id="page-booking" class="space-y-4">
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="font-bold text-lg text-gray-700">選擇時段預約</h2>
                    <span id="current-month" class="text-pink-600 font-bold text-sm bg-pink-50 px-4 py-1 rounded-full"></span>
                </div>
                <div class="grid grid-cols-7 gap-px text-center text-xs mb-2 text-gray-400 font-bold">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-px bg-gray-100 border border-gray-100"></div>
            </div>
            
            <div class="px-3 flex gap-4 text-xs text-gray-400 justify-center">
                <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-md slot-available"></span>可預約</div>
                <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-md slot-full"></span>已約滿/休假</div>
            </div>
        </section>

        <section id="page-notices" class="hidden space-y-4">
            <div id="notices-content" class="space-y-4"></div>
        </section>

        <section id="page-styles" class="hidden space-y-6">
            <div id="announcement-bar" class="bg-amber-50 border border-amber-100 p-3 rounded-xl flex items-center gap-2 text-amber-800 text-sm">
                <i class="fa-solid fa-bullhorn animate-bounce text-amber-500"></i>
                <marquee id="announcement">最新優惠活動載入中...</marquee>
            </div>
            <div id="styles-grid" class="grid grid-cols-2 gap-4"></div>
        </section>
    </main>

    <div id="booking-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 animate-slide-up shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-800">填寫預約資料</h3>
                <button onclick="closeBookingModal()" class="text-gray-400 text-2xl"><i class="fa-solid fa-circle-xmark"></i></button>
            </div>
            
            <form id="main-form" class="space-y-5" onsubmit="submitToGas(event)">
                <div class="bg-pink-50 p-4 rounded-2xl border border-pink-100 text-center">
                    <p id="display-datetime" class="text-pink-700 font-bold text-lg"></p>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">選擇款式</label>
                    <select id="form-style" required class="w-full bg-gray-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-pink-500"></select>
                </div>

                <div class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl border-2 border-transparent focus-within:border-pink-500">
                    <span class="font-bold text-gray-700 text-sm">需要卸甲 ($200)</span>
                    <input type="checkbox" id="form-remove" class="w-6 h-6 accent-pink-600">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">備註事項</label>
                    <textarea id="form-note" class="w-full bg-gray-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-pink-500" rows="2" placeholder="是否有延甲需求、過敏史..."></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-gray-900 text-white py-5 rounded-3xl font-bold text-lg shadow-xl active:scale-95 transition-all">
                    確認送出預約
                </button>
            </form>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwOu1lc0eXwa8Pph6fU4rkJIAbcgm1ej8wVTgJst3LJYu4XAvrgLdp21V3QTnSUs2gH/exec"; // 貼上妳的 GAS URL
        const LIFF_ID = "2009547519-PsSaE7hv";       // 貼上妳的 LIFF ID

        let appData = null;
        let selectedDate = null;
        let selectedTime = null;

        // 標準化時間顯示函數 (只顯示 HH:mm)
        function normalizeTime(timeStr) {
            if (!timeStr) return '';
            // 如果 GAS 傳來的是 Date 物件字串，嘗試解析它
            if (String(timeStr).includes('GMT') || String(timeStr).includes('台北標準時間')) {
                try {
                    const dateObj = new Date(timeStr);
                    if (!isNaN(dateObj.getTime())) {
                        const h = String(dateObj.getHours()).padStart(2, '0');
                        const m = String(dateObj.getMinutes()).padStart(2, '0');
                        return `${h}:${m}`;
                    }
                } catch (e) { console.error('Time Parse Error:', e); }
            }
            // 如果原本就是 HH:mm (例如 10:00)，只取前五碼
            const timeMatch = String(timeStr).match(/\d{1,2}:\d{2}/);
            return timeMatch ? timeMatch[0] : String(timeStr).trim();
        }

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                if (profile.pictureUrl) {
                    document.getElementById('user-avatar').src = profile.pictureUrl;
                    document.getElementById('user-avatar').classList.remove('hidden');
                }
                fetchData();
            } catch (err) { console.error('LIFF Init Error:', err); }
        }

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?action=getAppData`);
                appData = await res.json();
                console.log("資料載入成功：", appData);
                renderUI();
            } catch (err) { console.error('Fetch Data Error:', err); }
        }

        function renderUI() {
            // 1. 補回活動公告 (款式介紹分頁內)
            const promoData = appData.promos || [];
            const broadcast = promoData.find(p => String(p.類型).trim() === '廣播');
            if (broadcast) document.getElementById('announcement').innerText = broadcast.內容;
            
            // 2. 渲染款式介紹
            const styles = appData.styles || [];
            const grid = document.getElementById('styles-grid');
            grid.innerHTML = styles.map(s => `
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 text-center pb-2">
                    <img src="${s.圖片網址}" class="w-full h-32 object-cover">
                    <p class="font-bold text-xs mt-2 text-gray-800 truncate">${s.名稱}</p>
                    <p class="text-pink-600 text-xs font-bold mt-1">$${s.價格}</p>
                </div>
            `).join('');
            
            // 下拉選單也填充款式
            document.getElementById('form-style').innerHTML = styles.map(s => `<option value="${s.名稱}">${s.名稱}</option>`).join('');

            // 3. 渲染須知
            const rules = appData.rules || [];
            document.getElementById('notices-content').innerHTML = rules.map(r => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-pink-500">
                    <h4 class="font-bold text-gray-800 mb-2">${r.標題}</h4>
                    <p class="text-sm text-gray-500 leading-relaxed">${r.詳細內容}</p>
                </div>
            `).join('');

            renderCalendar();
        }

        // --- 核心修正：美觀的大月曆，且日期格子顯示三個時段 ---
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();

            document.getElementById('current-month').innerText = `${year}年 ${month + 1}月`;
            
            const firstDayOfMonth = new Date(year, month, 1);
            const lastDayOfMonth = new Date(year, month + 1, 0);
            
            const startDayOfWeek = firstDayOfMonth.getDay(); 
            const totalDaysInMonth = lastDayOfMonth.getDate();

            let html = "";
            
            // 1. 上月份空白格
            for (let j = 0; j < startDayOfWeek; j++) {
                html += `<div class="calendar-day empty"></div>`;
            }

            // 2. 生成當月每一天
            for (let i = 1; i <= totalDaysInMonth; i++) {
                const date = new Date(year, month, i);
                // 生成與試算表 YYYY/M/D 一致的比對字串
                const dStr = `${year}/${month + 1}/${i}`;

                const today = new Date();
                today.setHours(0,0,0,0);
                const isPast = date < today;
                const isToday = date.getTime() === today.getTime();

                const config = appData.settings.find(s => {
                    const sd = new Date(s.formattedDate);
                    return sd.getFullYear() === year && (sd.getMonth() + 1) === (month + 1) && sd.getDate() === i;
                });

                // 準備三個時段的狀態清單 (預設為滿)
                const timeSlots = [
                    { time: '10:00', status: '滿' },
                    { time: '14:00', status: '滿' },
                    { time: '19:00', status: '滿' }
                ];

                // 如果這天有開課，比對哪些時段是「可預約」
                if (config && config.availableSlots && !isPast) {
                    config.availableSlots.forEach(sTime => {
                        const tStr = String(sTime);
                        if (tStr.includes('10:00')) timeSlots[0].status = '預約';
                        if (tStr.includes('14:00')) timeSlots[1].status = '預約';
                        if (tStr.includes('19:00')) timeSlots[2].status = '預約';
                    });
                }

                html += `
                    <div class="calendar-day bg-white ${isToday ? 'today' : ''}">
                        <span class="day-num ${isPast ? 'text-gray-300' : ''}">${i}</span>
                        ${timeSlots.map(slot => {
                            // 過去、或未設資料這天這時段就是灰色的
                            const isAvail = slot.status === '預約' && !isPast && config;
                            const normalizedTime = normalizeTime(slot.time);
                            return `<div 
                                onclick="${isAvail ? `openBookingModal('${dStr}', '${normalizedTime}')` : ''}" 
                                class="slot-tag ${isAvail ? 'slot-available' : (slot.status === '休' ? 'slot-off' : 'slot-full')}">
                                ${isAvail ? normalizedTime : '滿'}
                            </div>`;
                        }).join('')}
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        // 點擊「可預約」時段按鈕，打開填寫彈窗
        function openBookingModal(date, time) {
            selectedDate = date;
            selectedTime = time;
            document.getElementById('display-datetime').innerText = `📅 ${date}  ⏰ ${time}`;
            document.getElementById('booking-modal').classList.remove('hidden');
        }

        function closeBookingModal() { document.getElementById('booking-modal').classList.add('hidden'); }

        async function submitToGas(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "傳送預約中...";

            try {
                const profile = await liff.getProfile();
                const payload = {
                    action: 'submitBooking',
                    userId: profile.userId,
                    name: profile.displayName,
                    date: selectedDate,
                    time: selectedTime,
                    style: document.getElementById('form-style').value,
                    removeNails: document.getElementById('form-remove').checked ? "是" : "否",
                    note: document.getElementById('form-note').value
                };

                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                if (res.ok) {
                    await liff.sendMessages([{
                        type: 'text',
                        text: `✅ 預約申請成功！\n日期：${selectedDate}\n時間：${selectedTime}\n款式：${payload.style}\n美甲師會儘速為您確認預約！`
                    }]);
                    liff.closeWindow();
                }
            } catch (err) {
                alert('預約失敗，請洽美甲師');
                btn.disabled = false;
                btn.innerText = "重新送出";
            }
        }

        function switchPage(page) {
            ['booking', 'notices', 'styles'].forEach(p => {
                document.getElementById(`page-${p}`).classList.add('hidden');
                document.getElementById(`tab-${p}`).classList.remove('active-tab');
                document.getElementById(`tab-${p}`).classList.add('text-gray-500');
            });
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.getElementById(`tab-${page}`).classList.add('active-tab');
        }

        window.onload = init;
    </script>
</body>
</html>
