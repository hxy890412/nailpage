<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Art Studio | 專業美甲預約</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #db2777; border-bottom: 3px solid #db2777; font-weight: bold; }
        .calendar-day.full { background-color: #f3f4f6; color: #d1d5db; pointer-events: none; }
        .calendar-day.selected { background-color: #db2777 ! shadow-lg; color: white !important; border-color: #db2777; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 pb-10">

    <header class="bg-white px-5 py-3 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-pink-600 rounded-lg flex items-center justify-center text-white italic font-serif text-xl shadow-md">N</div>
            <span class="font-bold text-lg tracking-wider text-gray-800 uppercase">Nail Studio</span>
        </div>
        <img id="user-avatar" src="" class="w-10 h-10 rounded-full border-2 border-pink-100 hidden">
    </header>

    <nav class="bg-white border-b flex text-center font-medium sticky top-[60px] z-40">
        <button onclick="switchPage('booking')" id="tab-booking" class="flex-1 py-4 active-tab">預約時段</button>
        <button onclick="switchPage('notices')" id="tab-notices" class="flex-1 py-4 text-gray-500">預約須知</button>
        <button onclick="switchPage('styles')" id="tab-styles" class="flex-1 py-4 text-gray-500">款式介紹</button>
    </nav>

    <main class="max-w-md mx-auto p-4">
        <section id="page-booking" class="space-y-4">
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-lg">選擇日期</h2>
                    <span id="current-month" class="text-pink-600 font-medium text-sm bg-pink-50 px-3 py-1 rounded-full"></span>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-xs mb-2 text-gray-400">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
                <div class="mt-4 flex gap-4 text-[10px] text-gray-400 justify-center">
                    <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-pink-500"></span>有時段</div>
                    <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-gray-200"></span>已約滿/休假</div>
                </div>
            </div>

            <div id="time-section" class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100 hidden">
                <h3 class="font-bold mb-3 text-gray-700">可選時段</h3>
                <div id="time-slots" class="grid grid-cols-3 gap-2"></div>
            </div>

            <button onclick="openBookingModal()" id="btn-next" class="w-full bg-pink-600 text-white py-4 rounded-2xl font-bold shadow-lg opacity-50 cursor-not-allowed transition-all" disabled>
                下一步：填寫預約細節
            </button>
        </section>

        <section id="page-notices" class="hidden space-y-4">
            <div id="notices-content" class="space-y-4"></div>
        </section>

        <section id="page-styles" class="hidden space-y-6">
            <div class="bg-amber-50 border border-amber-100 p-3 rounded-xl flex items-center gap-2 text-amber-800 text-sm">
                <i class="fa-solid fa-bullhorn animate-bounce text-amber-500"></i>
                <marquee id="announcement" behavior="scroll" direction="left">正在獲取最新活動資訊...</marquee>
            </div>
            
            <div id="promo-banner" class="w-full h-48 rounded-3xl overflow-hidden shadow-md bg-pink-50 relative">
                <img id="banner-img" src="" class="w-full h-full object-cover hidden">
                <div id="banner-placeholder" class="absolute inset-0 flex items-center justify-center text-pink-200">
                    <i class="fa-regular fa-image text-4xl"></i>
                </div>
            </div>

            <div id="styles-grid" class="grid grid-cols-2 gap-4"></div>
        </section>
    </main>

    <div id="booking-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 animate-slide-up max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-800">確認預約細節</h3>
                <button onclick="closeBookingModal()" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <form id="main-form" class="space-y-5" onsubmit="submitToGas(event)">
                <div class="bg-pink-50 p-4 rounded-2xl">
                    <p class="text-sm text-pink-600 font-medium">預定時間</p>
                    <p id="display-datetime" class="text-lg font-bold text-pink-900"></p>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">款式選單</label>
                    <select id="form-style" required class="w-full bg-gray-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-pink-500"></select>
                </div>

                <div class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl border-2 border-transparent focus-within:border-pink-500">
                    <span class="font-bold text-gray-700">需要卸甲 ($200)</span>
                    <input type="checkbox" id="form-remove" class="w-6 h-6 accent-pink-600">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">備註需求</label>
                    <textarea id="form-note" class="w-full bg-gray-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-pink-500" rows="2" placeholder="是否有延甲需求、指甲病史等..."></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-gray-900 text-white py-5 rounded-3xl font-bold text-lg shadow-xl active:scale-95 transition-all">
                    送出預約
                </button>
            </form>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyZ3P36Vvy-nxQ6AYd4UikdDNpG8xHq02bXqRXq6qwHXQ-jQD6h8BSz0bkeKzZs0Z5K/exec";
        const LIFF_ID = "2009547519-PsSaE7hv";

        let appData = null;
        let selectedDate = null;
        let selectedTime = null;

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                if (profile.pictureUrl) {
                    document.getElementById('user-avatar').src = profile.pictureUrl;
                    document.getElementById('user-avatar').classList.remove('hidden');
                }
                fetchData();
            } catch (err) { console.error('LIFF Init Error:', err); }
        }

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?action=getAppData`);
                appData = await res.json();
                console.log("資料加載完成", appData);
                renderUI();
            } catch (err) { console.error('Fetch Data Error:', err); }
        }

        function renderUI() {
            // 1. 處理公告與 Banner (防呆 trim())
            const promoData = appData.promos || [];
            const broadcast = promoData.find(p => String(p.類型).trim() === '廣播');
            if (broadcast) document.getElementById('announcement').innerText = broadcast.內容;

            const banner = promoData.find(p => String(p.類型).trim() === '輪播圖');
            if (banner && banner.內容) {
                const img = document.getElementById('banner-img');
                img.src = banner.內容;
                img.classList.remove('hidden');
                document.getElementById('banner-placeholder').classList.add('hidden');
            }

            // 2. 處理款式介紹
            const styles = appData.styles || [];
            const grid = document.getElementById('styles-grid');
            const select = document.getElementById('form-style');
            grid.innerHTML = styles.map(s => `
                <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-50">
                    <img src="${s.圖片網址}" class="w-full h-32 object-cover">
                    <div class="p-3 text-center">
                        <p class="font-bold text-xs text-gray-800 truncate">${s.名稱}</p>
                        <p class="text-pink-600 font-bold text-xs mt-1">$${s.價格}</p>
                    </div>
                </div>
            `).join('');
            select.innerHTML = styles.map(s => `<option value="${s.名稱}">${s.名稱}</option>`).join('');

            // 3. 處理預約須知
            const rules = appData.rules || [];
            document.getElementById('notices-content').innerHTML = rules.map(r => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-pink-500">
                    <h4 class="font-bold text-gray-800 mb-2">${r.標題}</h4>
                    <p class="text-sm text-gray-500 leading-relaxed">${r.詳細內容}</p>
                </div>
            `).join('');

            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const now = new Date();
            document.getElementById('current-month').innerText = `${now.getMonth() + 1}月`;
            
            let html = "";
            for (let i = 0; i < 21; i++) {
                const date = new Date();
                date.setDate(now.getDate() + i);
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                const dStr = `${y}-${m}-${d}`;

                // 比對 GAS 傳回來的 formattedDate
                const config = appData.settings.find(s => s.formattedDate === dStr);
                const count = config ? config.availableSlots.length : 0;

                const isFull = count === 0;
                const badge = isFull ? '<span class="text-gray-300">滿</span>' : `<span class="text-pink-500 font-bold">餘 ${count}</span>`;

                html += `
                    <div onclick="clickDate('${dStr}', this)" class="calendar-day ${isFull ? 'full' : ''} p-3 rounded-2xl border-2 border-transparent cursor-pointer transition-all hover:bg-pink-50 flex flex-col items-center">
                        <span class="text-sm font-bold">${date.getDate()}</span>
                        <span class="text-[9px] mt-1">${badge}</span>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        function clickDate(dateStr, el) {
            selectedDate = dateStr;
            document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');

            const config = appData.settings.find(s => s.formattedDate === dateStr);
            const timeGrid = document.getElementById('time-slots');

            if (config && config.availableSlots.length > 0) {
                timeGrid.innerHTML = config.availableSlots.map(t => `
                    <button onclick="clickTime('${t}', this)" class="time-btn border-2 border-pink-100 py-3 rounded-xl text-sm font-bold text-pink-700 bg-white transition-all">
                        ${t}
                    </button>
                `).join('');
                document.getElementById('time-section').classList.remove('hidden');
            } else {
                document.getElementById('time-section').classList.add('hidden');
            }
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function clickTime(time, el) {
            selectedTime = time;
            document.querySelectorAll('.time-btn').forEach(b => {
                b.className = 'time-btn border-2 border-pink-100 py-3 rounded-xl text-sm font-bold text-pink-700 bg-white transition-all';
            });
            el.className = 'time-btn bg-pink-600 text-white py-3 rounded-xl text-sm font-bold shadow-md transition-all';

            const btnNext = document.getElementById('btn-next');
            btnNext.disabled = false;
            btnNext.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function openBookingModal() {
            document.getElementById('display-datetime').innerText = `${selectedDate} ${selectedTime}`;
            document.getElementById('booking-modal').classList.remove('hidden');
        }

        function closeBookingModal() { document.getElementById('booking-modal').classList.add('hidden'); }

        async function submitToGas(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "預約傳送中...";

            try {
                const profile = await liff.getProfile();
                const payload = {
                    action: 'submitBooking',
                    userId: profile.userId,
                    name: profile.displayName,
                    date: selectedDate,
                    time: selectedTime,
                    style: document.getElementById('form-style').value,
                    removeNails: document.getElementById('form-remove').checked ? "是" : "否",
                    note: document.getElementById('form-note').value
                };

                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                if (res.ok) {
                    await liff.sendMessages([{
                        type: 'text',
                        text: `✅ 預約申請已送出！\n\n📅 日期：${selectedDate}\n⏰ 時間：${selectedTime}\n✨ 款式：${payload.style}\n\n美甲師會儘速為您確認預約！`
                    }]);
                    liff.closeWindow();
                }
            } catch (err) {
                alert('預約失敗，請點擊確認重試');
                btn.disabled = false;
                btn.innerText = "重新送出預約";
            }
        }

        function switchPage(page) {
            ['booking', 'notices', 'styles'].forEach(p => {
                document.getElementById(`page-${p}`).classList.add('hidden');
                document.getElementById(`tab-${p}`).classList.remove('active-tab');
                document.getElementById(`tab-${p}`).classList.add('text-gray-500');
            });
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.getElementById(`tab-${page}`).classList.add('active-tab');
            document.getElementById(`tab-${page}`).classList.remove('text-gray-500');
        }

        window.onload = init;
    </script>
</body>
</html>
