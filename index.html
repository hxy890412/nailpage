<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Studio | 預約看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #db2777; border-bottom: 3px solid #db2777; font-weight: bold; }
        .calendar-day { min-height: 95px; background: white; border: 0.5px solid #f3f4f6; display: flex; flex-direction: column; align-items: center; padding: 4px 2px; cursor: pointer; }
        .day-num { font-size: 14px; font-weight: bold; color: #4b5563; margin-bottom: 4px; }
        .slot-tag { font-size: 10px; color: #db2777; background: #fdf2f8; border-radius: 4px; padding: 2px 4px; margin-bottom: 2px; width: 90%; text-align: center; font-weight: bold; transform: scale(0.9); }
        
        .calendar-day.past { background-color: #f9fafb; cursor: default; opacity: 0.4; }
        .calendar-day.empty { background-color: #fafafa; cursor: default; }
        .calendar-day.today { outline: 2px solid #db2777; outline-offset: -2px; z-index: 10; border-radius: 4px; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 pb-10">

    <header class="bg-white px-5 py-3 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-pink-600 rounded-lg flex items-center justify-center text-white italic font-bold text-xl shadow-md">N</div>
            <span class="font-bold text-lg tracking-wider text-gray-800 uppercase">Nail Studio</span>
        </div>
        <img id="user-avatar" src="" class="w-10 h-10 rounded-full hidden border-2 border-pink-100">
    </header>

    <nav class="bg-white border-b flex text-center sticky top-[60px] z-40">
        <button onclick="switchPage('booking')" id="tab-booking" class="flex-1 py-4 active-tab text-sm">預約時段</button>
        <button onclick="switchPage('notices')" id="tab-notices" class="flex-1 py-4 text-gray-500 text-sm">預約須知</button>
        <button onclick="switchPage('styles')" id="tab-styles" class="flex-1 py-4 text-gray-500 text-sm">款式介紹</button>
    </nav>

    <main class="max-w-md mx-auto p-2">
        <section id="page-booking">
            <div class="bg-white rounded-3xl p-4 shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 id="current-month" class="font-bold text-gray-700">載入中...</h2>
                    <span class="text-[10px] text-pink-600 font-bold">● 可預約時段</span>
                </div>
                <div class="grid grid-cols-7 text-center text-xs mb-2 text-gray-400 font-bold">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-px bg-gray-100 border border-gray-100 rounded-xl overflow-hidden"></div>
            </div>
        </section>

        <section id="page-notices" class="hidden space-y-4"></section>

        <section id="page-styles" class="hidden space-y-4">
            <div id="styles-grid" class="grid grid-cols-2 gap-4"></div>
        </section>
    </main>

    <div id="booking-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 animate-slide-up shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">選擇詳細內容</h3>
                <button onclick="closeModal()" class="text-gray-400 text-2xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form class="space-y-6" onsubmit="submitForm(event)">
                <div id="modal-date-display" class="bg-pink-50 p-4 rounded-2xl text-pink-700 font-bold text-center"></div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">可預約時段</label>
                    <div id="time-options" class="grid grid-cols-3 gap-3"></div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">選擇款式</label>
                    <select id="form-style" required class="w-full bg-gray-50 border-none rounded-2xl p-4 font-bold"></select>
                </div>

                <div class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl font-bold text-gray-700">
                    <span>需卸甲 ($200)</span>
                    <input type="checkbox" id="form-remove" class="w-6 h-6 accent-pink-600">
                </div>

                <button type="submit" id="submit-btn" disabled class="w-full bg-gray-900 text-white py-5 rounded-3xl font-bold opacity-50 shadow-lg">確認預約</button>
            </form>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyZ3P36Vvy-nxQ6AYd4UikdDNpG8xHq02bXqRXq6qwHXQ-jQD6h8BSz0bkeKzZs0Z5K/exec";
        const LIFF_ID = "2009547519-PsSaE7hv";
        let appData = { settings: [], styles: [], rules: [] };
        let selDate, selTime;

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                if (profile.pictureUrl) {
                    document.getElementById('user-avatar').src = profile.pictureUrl;
                    document.getElementById('user-avatar').classList.remove('hidden');
                }
            } catch (e) {}
            fetchData();
        }

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?action=getAppData`);
                const data = await res.json();
                // 對接妳 GAS 的資料結構
                appData.settings = data.settings || [];
                appData.styles = data.styles || [];
                appData.rules = data.rules || [];
                renderUI();
            } catch (e) {
                console.error("Fetch Error:", e);
                renderCalendar(); 
            }
        }

        function renderUI() {
            // 1. 款式渲染
            const stylesGrid = document.getElementById('styles-grid');
            if(stylesGrid) {
                stylesGrid.innerHTML = appData.styles.map(s => `
                    <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 text-center pb-2">
                        <img src="${s.圖片網址}" class="w-full h-32 object-cover">
                        <p class="font-bold text-xs mt-2 truncate px-1">${s.名稱}</p>
                        <p class="text-pink-600 text-xs font-bold">$${s.價格}</p>
                    </div>
                `).join('');
                document.getElementById('form-style').innerHTML = appData.styles.map(s => `<option value="${s.名稱}">${s.名稱}</option>`).join('');
            }
            
            // 2. 須知渲染 (這裡修正了之前找不到 ID 的錯誤)
            const noticesPage = document.getElementById('page-notices');
            if(noticesPage) {
                noticesPage.innerHTML = appData.rules.map(r => `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-pink-500 mb-3 mx-2">
                        <h4 class="font-bold text-gray-800 mb-1">${r.標題}</h4>
                        <p class="text-sm text-gray-500">${r.詳細內容}</p>
                    </div>
                `).join('');
            }

            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            document.getElementById('current-month').innerText = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            
            // 格式化今天日期以便比對
            const todayStr = `${year}-${String(month+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

            let html = "";
            for (let j = 0; j < firstDay; j++) html += `<div class="calendar-day empty"></div>`;

            for (let i = 1; i <= lastDate; i++) {
                const dayStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                
                // 比對 GAS 傳來的 formattedDate
                const match = appData.settings.find(s => s.formattedDate === dayStr);
                const slots = (match && match.availableSlots) ? match.availableSlots : [];
                
                const isPast = dayStr < todayStr;
                const isToday = dayStr === todayStr;

                // 畫出月曆格子上的小標籤 (只顯示有的時段)
                const slotTags = slots.map(t => `<div class="slot-tag">${t}</div>`).join('');

                html += `
                    <div onclick="${(isPast || slots.length === 0) ? '' : `openModal('${dayStr}', ${JSON.stringify(slots)})`}" 
                         class="calendar-day ${isPast ? 'past' : ''} ${isToday ? 'today' : ''}">
                        <span class="day-num">${i}</span>
                        <div class="w-full flex flex-col items-center overflow-hidden">
                            ${slotTags}
                        </div>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        function openModal(dStr, slots) {
            selDate = dStr; selTime = null;
            document.getElementById('modal-date-display').innerText = `📅 ${dStr}`;
            const container = document.getElementById('time-options');
            
            // 彈窗內顯示該日期的可用時段
            container.innerHTML = slots.map(t => `
                <button type="button" onclick="selectTime('${t}', this)" 
                    class="py-4 rounded-2xl border-2 border-pink-100 text-pink-600 font-bold text-sm bg-white transition-all">
                    ${t}
                </button>
            `).join('');
            
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').classList.add('opacity-50');
            document.getElementById('booking-modal').classList.remove('hidden');
        }

        function selectTime(t, el) {
            selTime = t;
            document.querySelectorAll('#time-options button').forEach(b => {
                b.classList.remove('bg-pink-600', 'text-white', 'border-pink-600');
                b.classList.add('text-pink-600', 'bg-white', 'border-pink-100');
            });
            el.classList.add('bg-pink-600', 'text-white', 'border-pink-600');
            el.classList.remove('text-pink-600', 'bg-white', 'border-pink-100');
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').classList.remove('opacity-50');
        }

        function closeModal() { document.getElementById('booking-modal').classList.add('hidden'); }

        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "傳送中...";
            try {
                const profile = await liff.getProfile();
                const payload = {
                    action: 'submitBooking',
                    userId: profile.userId, name: profile.displayName,
                    date: selDate, time: selTime,
                    style: document.getElementById('form-style').value,
                    removeNails: document.getElementById('form-remove').checked ? "是" : "否",
                    note: "" // 妳的 GAS 預計有 note 欄位
                };
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                await liff.sendMessages([{ type: 'text', text: `💅 預約申請已送出！\n日期：${selDate}\n時間：${selTime}\n款式：${payload.style}\n卸甲：${payload.removeNails}\n\n請等待美甲師回覆確認喔！` }]);
                liff.closeWindow();
            } catch (err) { alert("傳送失敗"); btn.disabled = false; btn.innerText = "確認預約"; }
        }

        function switchPage(p) {
            ['booking', 'notices', 'styles'].forEach(id => {
                document.getElementById(`page-${id}`).classList.toggle('hidden', id !== p);
                document.getElementById(`tab-${id}`).classList.toggle('active-tab', id === p);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
