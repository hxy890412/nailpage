<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>151.5 Nail Studio | 預約系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="pb-24">

    <div class="marquee-container" id="marquee-box">
        <div class="marquee-content" id="marquee-text">✨ 歡迎光臨 151.5 Nail Studio ✨</div>
    </div>

    <header class="sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
        <div onclick="window.location.reload();" class="flex flex-col cursor-pointer">
            <h1 class="brand-title font-bold text-gray-800 text-xl italic">151.5 Nail Studio</h1>
            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-[0.3em]">Nail Artist Portfolio</p>
        </div>
        <img id="user-avatar" class="w-9 h-9 rounded-full grayscale hidden">
    </header>

    <nav class="flex justify-center gap-1 px-4 py-2 overflow-x-auto no-scrollbar bg-white">
        <button onclick="switchPage('booking')" id="tab-booking" class="nav-tag active">預約時段</button>
        <button onclick="switchPage('styles')" id="tab-styles" class="nav-tag">款式介紹</button>
        <button onclick="switchPage('promo')" id="tab-promo" class="nav-tag">最新公告</button>
        <button onclick="switchPage('notices')" id="tab-notices" class="nav-tag">預約須知</button>
    </nav>

    <main class="max-w-md mx-auto px-4 mt-6">
        
        <section id="page-booking" class="page-content">
            <div class="calendar-card">
                <div class="flex justify-between items-center mb-8">
                    <button onclick="changeMonth(-1)" class="text-gray-300 hover:text-gray-600 transition"><i class="fa-solid fa-arrow-left-long"></i></button>
                    <h2 id="current-month" class="text-lg font-bold tracking-widest text-gray-700"></h2>
                    <button onclick="changeMonth(1)" class="text-gray-300 hover:text-gray-600 transition"><i class="fa-solid fa-arrow-right-long"></i></button>
                </div>
                <div class="grid grid-cols-7 text-center mb-4 text-[10px] font-bold text-gray-300 uppercase tracking-widest">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
            </div>
        </section>

        <section id="page-styles" class="page-content hidden">
            <div id="styles-grid" class="grid grid-cols-2 gap-3"></div>
        </section>

        <section id="page-promo" class="page-content hidden space-y-4">
            <div id="promo-list" class="space-y-4"></div>
        </section>

        <section id="page-notices" class="page-content hidden space-y-4"></section>
    </main>

    <a href="https://line.me/ti/p/@您的ID" target="_blank" class="line-btn shadow-lg">
        <i class="fa-brands fa-line"></i>
    </a>

    <div id="booking-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 modal-up shadow-2xl overflow-y-auto max-h-[85vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-800">Reservation</h3>
                <button onclick="closeModal()" class="w-10 h-10 bg-gray-50 rounded-full text-gray-400 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div id="display-date" class="text-sm tracking-widest text-gray-500 font-bold mb-8 border-b border-gray-100 pb-4"></div>
            
            <form onsubmit="submitForm(event)" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Select Time</label>
                    <div id="time-options" class="grid grid-cols-3 gap-3"></div>
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Design Style</label>
                    <select id="form-style" required class="w-full bg-white border border-gray-200 rounded-lg p-4 font-medium text-gray-700 outline-none"></select>
                </div>

                <div class="flex items-center justify-between bg-white p-5 rounded-lg border border-gray-100">
                    <span class="text-sm font-bold text-gray-600">需要卸甲 (+$200)</span>
                    <input type="checkbox" id="form-remove" class="w-5 h-5 accent-[#8c7662]">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Note</label>
                    <textarea id="form-note" class="w-full bg-white border border-gray-200 rounded-lg p-4 text-sm" placeholder="如果有特別需求或款式想諮詢..."></textarea>
                </div>

                <button type="submit" id="submit-btn" disabled class="w-full text-white py-5 rounded-lg font-bold text-sm shadow-lg disabled:opacity-30 transition-all uppercase tracking-[0.2em]">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script>
        // --- 設定區 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyh4a4H6L2wiPwlbwGVR0ecHITAWNgMhR_l-RBR49oEanzmnZLI6mcKsq8Pi1ELeB5A/exec"; 
        const LIFF_ID = "2009547519-PsSaE7hv";
        
        let appData = { settings: [], styles: [], rules: [], promos: [] };
        let viewDate = new Date();
        let selDate, selTime;

        // 初始化
        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                document.getElementById('user-avatar').src = profile.pictureUrl;
                document.getElementById('user-avatar').classList.remove('hidden');
            } catch (e) { console.log("LIFF failed"); }
            fetchData();
        }

        // 抓取後端資料
        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?action=getAppData`);
                appData = await res.json();
                renderUI();
            } catch (e) { console.error("Fetch Data Error:", e); }
        }

        // 渲染整體介面
        function renderUI() {
            // 跑馬燈
            const marqueeText = appData.promos.map(p => `📢 ${p.類型}: ${p.內容}`).join(' ｜ ');
            document.getElementById('marquee-text').innerText = marqueeText || "✨ Welcome to 151.5 Nail Studio ✨";

            // 最新公告
            document.getElementById('promo-list').innerHTML = appData.promos.map(p => `
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <span class="text-[10px] text-[#8c7662] font-bold uppercase tracking-widest border-b border-[#8c7662] pb-1">${p.類型}</span>
                    <h4 class="font-bold text-gray-700 mt-4 text-md leading-relaxed">${p.內容}</h4>
                </div>
            `).join('');

            // 款式介紹 (IG 牆風格)
            document.getElementById('styles-grid').innerHTML = appData.styles.map(s => `
                <div class="style-item shadow-sm">
                    <img src="${s.圖片網址}" class="w-full">
                    <div class="p-3 bg-white">
                        <p class="font-bold text-[11px] text-gray-700 mb-1 truncate">${s.名稱}</p>
                        <p class="text-gray-400 text-[10px]">$${s.價格}</p>
                    </div>
                </div>
            `).join('');
            
            // 下拉選單
            document.getElementById('form-style').innerHTML = '<option value="" disabled selected>請選擇預約款式</option>' + 
                appData.styles.map(s => `<option value="${s.名稱}">${s.名稱}</option>`).join('');

            // 預約須知
            document.getElementById('page-notices').innerHTML = appData.rules.map(r => `
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                    <h4 class="font-bold text-gray-700 mb-3 flex items-center gap-2"><i class="fa-solid fa-circle text-[4px] text-[#d9c5b2]"></i>${r.標題}</h4>
                    <p class="text-xs text-gray-400 leading-loose">${r.詳細內容}</p>
                </div>
            `).join('');
            
            renderCalendar();
        }

        // 渲染月曆
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            document.getElementById('current-month').innerText = `${year} / ${String(month + 1).padStart(2, '0')}`;
            grid.innerHTML = "";
            
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const today = new Date(); today.setHours(0, 0, 0, 0);

            for (let j = 0; j < firstDay; j++) grid.innerHTML += `<div></div>`;
            
            for (let i = 1; i <= lastDate; i++) {
                const dObj = new Date(year, month, i);
                const dStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const isPast = dObj < today;
                
                const match = appData.settings.find(s => s.formattedDate === dStr);
                const slots = match ? match.availableSlots : [];
                
                const dayDiv = document.createElement('div');
                dayDiv.className = `calendar-day ${isPast ? 'past-day' : (slots.length > 0 ? 'has-slots' : '')} ${dObj.getTime() === today.getTime() ? 'today-mark' : ''}`;
                
                let html = `<span class="day-num font-medium">${i}</span>`;
                if (!isPast && slots.length > 0) { 
                    html += `<div class="slot-text">Booking</div>`; 
                }
                dayDiv.innerHTML = html;
                
                if (slots.length > 0 && !isPast) { 
                    dayDiv.onclick = () => openModal(dStr, slots); 
                }
                grid.appendChild(dayDiv);
            }
        }

        // 開啟預約視窗
        function openModal(dStr, slots) {
            selDate = dStr; selTime = null;
            document.getElementById('display-date').innerText = `DATE / ${dStr}`;
            document.getElementById('time-options').innerHTML = slots.map(t => `
                <button type="button" onclick="selectTime('${t}', this)" class="time-btn py-4 rounded-lg font-medium text-xs transition-all">${t}</button>
            `).join('');
            document.getElementById('booking-modal').classList.remove('hidden');
            document.getElementById('submit-btn').disabled = true;
        }

        // 選擇時間
        function selectTime(t, el) {
            selTime = t;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('submit-btn').disabled = false;
        }

        function closeModal() { document.getElementById('booking-modal').classList.add('hidden'); }

        // 提交預約
        async function submitForm(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = 'SENDING...';

            try {
                let userId = "Unknown", displayName = "Guest";
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    userId = profile.userId;
                    displayName = profile.displayName;
                }

                const payload = {
                    action: 'submitBooking',
                    userId: userId,
                    name: displayName,
                    date: selDate,
                    time: selTime,
                    style: document.getElementById('form-style').value,
                    removeNails: document.getElementById('form-remove').checked ? "是" : "否",
                    note: document.getElementById('form-note').value
                };

                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });

                setTimeout(() => {
                    closeModal();
                    alert("預約已送出，請靜候美甲師通知 ❤️");
                    liff.closeWindow();
                }, 1000);
            } catch (err) {
                alert("提交失敗，請檢查網路連線。");
                btn.disabled = false;
                btn.innerHTML = "Confirm Booking";
            }
        }

        // 切換頁面
        function switchPage(p) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.querySelectorAll('.nav-tag').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${p}`).classList.add('active');
        }

        // 切換月份
        function changeMonth(step) {
            viewDate.setMonth(viewDate.getMonth() + step);
            renderCalendar();
        }

        window.onload = init;
    </script>
</body>
</html>
