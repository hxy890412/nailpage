<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Studio | 預約看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #db2777; border-bottom: 3px solid #db2777; font-weight: bold; }
        .calendar-grid { display: grid; grid-template-cols: repeat(7, 1fr); gap: 1px; background-color: #f3f4f6; border: 1px solid #f3f4f6; }
        .calendar-day { min-height: 100px; background: white; display: flex; flex-direction: column; align-items: center; padding: 5px 2px; }
        .day-num { font-size: 11px; font-weight: bold; color: #9ca3af; margin-bottom: 4px; }
        .slot-btn { width: 92%; font-size: 10px; margin-top: 2px; padding: 3px 0; text-align: center; border-radius: 6px; font-weight: bold; transition: all 0.2s; }
        /* 狀態樣式 */
        .status-available { background-color: #fdf2f8; color: #db2777; border: 1px solid #fbcfe8; cursor: pointer; }
        .status-available:active { background-color: #db2777; color: white; }
        .status-full { background-color: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; cursor: not-allowed; }
        .status-off { background-color: #fef2f2; color: #f87171; border: 1px solid #fee2e2; cursor: not-allowed; }
        .calendar-day.empty { background-color: #fafafa; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 pb-10">

    <header class="bg-white px-5 py-3 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-pink-600 rounded-lg flex items-center justify-center text-white italic font-bold text-lg">N</div>
            <span class="font-bold text-gray-800 tracking-tight">NAIL STUDIO</span>
        </div>
        <img id="user-avatar" src="" class="w-8 h-8 rounded-full hidden">
    </header>

    <nav class="bg-white border-b flex text-center sticky top-[52px] z-40">
        <button onclick="switchPage('booking')" id="tab-booking" class="flex-1 py-3 active-tab text-sm">預約看板</button>
        <button onclick="switchPage('styles')" id="tab-styles" class="flex-1 py-3 text-gray-500 text-sm">款式介紹</button>
    </nav>

    <main class="max-w-md mx-auto p-2">
        <section id="page-booking">
            <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                <div class="p-4 flex justify-between items-center">
                    <h2 id="current-month" class="font-bold text-gray-700">月份載入中...</h2>
                    <div class="flex gap-2 text-[10px]">
                        <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-pink-400"></i>可約</span>
                        <span class="flex items-center gap-1"><i class="fa-solid fa-circle text-gray-300"></i>滿/休</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-7 text-center text-[11px] py-2 bg-gray-50 text-gray-400 font-bold">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="calendar-grid" class="calendar-grid"></div>
            </div>
        </section>

        <section id="page-styles" class="hidden p-2">
            <div id="styles-grid" class="grid grid-cols-2 gap-4"></div>
        </section>
    </main>

    <div id="booking-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[30px] p-6 animate-slide-up shadow-2xl">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-lg font-bold">填寫預約資料</h3>
                <button onclick="closeModal()" class="text-gray-400 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form class="space-y-4" onsubmit="submitBooking(event)">
                <div class="bg-pink-50 p-3 rounded-xl text-center">
                    <p id="display-datetime" class="text-pink-700 font-bold"></p>
                </div>
                <select id="form-style" required class="w-full bg-gray-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-pink-500"></select>
                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl">
                    <span class="text-sm font-bold text-gray-600">需要卸甲 ($200)</span>
                    <input type="checkbox" id="form-remove" class="w-5 h-5 accent-pink-600">
                </div>
                <textarea id="form-note" class="w-full bg-gray-50 border-none rounded-xl p-3 text-sm" rows="2" placeholder="備註需求..."></textarea>
                <button type="submit" id="submit-btn" class="w-full bg-pink-600 text-white py-4 rounded-xl font-bold shadow-lg">確認預約</button>
            </form>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwOu1lc0eXwa8Pph6fU4rkJIAbcgm1ej8wVTgJst3LJYu4XAvrgLdp21V3QTnSUs2gH/exec";
        const LIFF_ID = "2009547519-PsSaE7hv";
        let appData = null;
        let selDate, selTime;

        async function init() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) liff.login();
            const profile = await liff.getProfile();
            if (profile.pictureUrl) {
                document.getElementById('user-avatar').src = profile.pictureUrl;
                document.getElementById('user-avatar').classList.remove('hidden');
            }
            fetchData();
        }

        async function fetchData() {
            const res = await fetch(`${GAS_URL}?action=getAppData`);
            appData = await res.json();
            renderUI();
        }

        function renderUI() {
            // 填充款式下拉選單
            document.getElementById('form-style').innerHTML = appData.styles.map(s => `<option value="${s.名稱}">${s.名稱}</option>`).join('');
            
            // 填充款式牆
            document.getElementById('styles-grid').innerHTML = appData.styles.map(s => `
                <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100">
                    <img src="${s.圖片網址}" class="w-full h-32 object-cover">
                    <div class="p-2 text-center">
                        <p class="font-bold text-xs">${s.名稱}</p>
                        <p class="text-pink-600 font-bold text-xs">$${s.價格}</p>
                    </div>
                </div>
            `).join('');

            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            document.getElementById('current-month').innerText = `${year}年 ${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            let html = "";
            // 空白格
            for (let j = 0; j < firstDay; j++) html += `<div class="calendar-day empty"></div>`;

            // 日期格
            for (let i = 1; i <= lastDate; i++) {
                const dateStr = `${year}/${month + 1}/${i}`;
                
                // 找出這天的資料
                const dayData = appData.settings.find(s => {
                    const d = new Date(s.formattedDate);
                    return d.getFullYear() === year && (d.getMonth() + 1) === (month + 1) && d.getDate() === i;
                });

                // 這邊是核心邏輯：對應妳的試算表 3 個時段
                // 假設妳的 GAS 回傳的 availableSlots 格式是：["10:00|可預約", "14:00|已約滿", "19:00|休假"]
                // 或者只是 ["10:00", "19:00"] (代表只有這兩個是可預約)
                
                const timeSlots = [
                    { t: '10:00', status: '滿' },
                    { t: '14:00', status: '滿' },
                    { t: '19:00', status: '滿' }
                ];

                if (dayData && dayData.availableSlots) {
                    dayData.availableSlots.forEach(slotStr => {
                        const s = String(slotStr).trim();
                        // 判定「可預約」的邏輯：只要字串包含時間且沒說滿/休，或妳 GAS 已經過濾好
                        if (s.includes('10:00')) timeSlots[0].status = '預約';
                        if (s.includes('14:00')) timeSlots[1].status = '預約';
                        if (s.includes('19:00')) timeSlots[2].status = '預約';
                    });
                }

                html += `
                    <div class="calendar-day">
                        <span class="day-num">${i}</span>
                        ${timeSlots.map(slot => {
                            const isAvail = slot.status === '預約';
                            return `<div 
                                onclick="${isAvail ? `openModal('${dateStr}', '${slot.t}')` : ''}"
                                class="slot-btn ${isAvail ? 'status-available' : 'status-full'}">
                                ${isAvail ? slot.t : '滿'}
                            </div>`;
                        }).join('')}
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        function openModal(d, t) {
            selDate = d; selTime = t;
            document.getElementById('display-datetime').innerText = `📅 ${d}  ⏰ ${t}`;
            document.getElementById('booking-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('booking-modal').classList.add('hidden'); }

        async function submitBooking(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "傳送中...";

            const profile = await liff.getProfile();
            const payload = {
                action: 'submitBooking',
                userId: profile.userId,
                name: profile.displayName,
                date: selDate,
                time: selTime,
                style: document.getElementById('form-style').value,
                removeNails: document.getElementById('form-remove').checked ? "是" : "否",
                note: document.getElementById('form-note').value
            };

            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            await liff.sendMessages([{ type: 'text', text: `💅 預約成功！\n日期：${selDate}\n時間：${selTime}\n期待您的光臨！` }]);
            liff.closeWindow();
        }

        function switchPage(p) {
            document.getElementById('page-booking').classList.toggle('hidden', p !== 'booking');
            document.getElementById('page-styles').classList.toggle('hidden', p !== 'styles');
            document.getElementById('tab-booking').className = p === 'booking' ? 'flex-1 py-3 active-tab text-sm' : 'flex-1 py-3 text-gray-500 text-sm';
            document.getElementById('tab-styles').className = p === 'styles' ? 'flex-1 py-3 active-tab text-sm' : 'flex-1 py-3 text-gray-500 text-sm';
        }

        window.onload = init;
    </script>
</body>
</html>
