<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Studio | 預約系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #db2777; border-bottom: 3px solid #db2777; font-weight: bold; }
        .calendar-day { min-height: 100px; background: white; border: 0.5px solid #f3f4f6; display: flex; flex-direction: column; align-items: center; padding: 6px 2px; }
        .day-num { font-size: 14px; font-weight: bold; color: #4b5563; }
        .slot-row { width: 100%; font-size: 10px; text-align: center; margin-top: 2px; font-weight: 600; }
        .status-ok { color: #db2777; } .status-full { color: #9ca3af; } .status-off { color: #ef4444; }
        .past { background-color: #f9fafb; opacity: 0.6; }
        .today { outline: 2px solid #db2777; outline-offset: -2px; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 pb-10">

    <header class="bg-white px-5 py-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-pink-600 rounded-lg flex items-center justify-center text-white font-bold">N</div>
            <span class="font-bold text-gray-800">NAIL STUDIO</span>
        </div>
        <img id="user-avatar" class="w-10 h-10 rounded-full border hidden">
    </header>

    <nav class="bg-white border-b flex text-center sticky top-[64px] z-40">
        <button onclick="switchPage('booking')" id="tab-booking" class="flex-1 py-4 active-tab">預約看板</button>
        <button onclick="switchPage('notices')" id="tab-notices" class="flex-1 py-4 text-gray-500">預約須知</button>
        <button onclick="switchPage('styles')" id="tab-styles" class="flex-1 py-4 text-gray-500">活動款式</button>
    </nav>

    <main class="max-w-md mx-auto p-3">
        <section id="page-booking">
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                <h2 id="current-month" class="font-bold text-gray-700 mb-4 px-1"></h2>
                <div class="grid grid-cols-7 text-center text-xs mb-2 text-gray-400">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-px bg-gray-100 border rounded-lg overflow-hidden"></div>
            </div>
        </section>

        <section id="page-notices" class="hidden space-y-4"></section>

        <section id="page-styles" class="hidden grid grid-cols-2 gap-4"></section>
    </main>

    <div id="booking-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[30px] p-8 transition-transform">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">選擇預約細節</h3>
                <button onclick="closeModal()" class="text-gray-400 text-2xl">×</button>
            </div>
            <form onsubmit="submitForm(event)" class="space-y-5">
                <div id="modal-date-display" class="bg-pink-50 p-3 rounded-xl text-pink-700 font-bold text-center"></div>
                <div id="time-options" class="grid grid-cols-3 gap-2"></div>
                <select id="form-style" required class="w-full bg-gray-100 border-none rounded-xl p-4"></select>
                <label class="flex items-center justify-between bg-gray-100 p-4 rounded-xl cursor-pointer">
                    <span class="font-bold text-gray-700">需卸甲 (+$200)</span>
                    <input type="checkbox" id="form-remove" class="w-6 h-6 accent-pink-600">
                </label>
                <button type="submit" id="submit-btn" disabled class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold opacity-50">確認送出預約</button>
            </form>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyJI9Nsy7UxJ0OlkitWVDuBkuE5tpr8_-I3iwlqdXyEl25Uj8K-490nRrpQ0sRKpiul/exec"; 
        const LIFF_ID = "2009547519-PsSaE7hv";
        let appData = { allSlots: [], styles: [], rules: [] };
        let selDate, selTime;

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                document.getElementById('user-avatar').src = profile.pictureUrl;
                document.getElementById('user-avatar').classList.remove('hidden');
                fetchData();
            } catch (e) { fetchData(); }
        }

        async function fetchData() {
            const res = await fetch(`${GAS_URL}?action=getAppData`);
            appData = await res.json();
            renderUI();
        }

        function renderUI() {
            // 渲染款式與須知
            document.getElementById('page-styles').innerHTML = appData.styles.map(s => `
                <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100">
                    <img src="${s.圖片網址}" class="w-full h-32 object-cover">
                    <div class="p-2 text-center"><p class="font-bold text-xs">${s.名稱}</p><p class="text-pink-600 text-xs">$${s.價格}</p></div>
                </div>`).join('');
            document.getElementById('form-style').innerHTML = '<option value="" disabled selected>選擇款式</option>' + 
                appData.styles.map(s => `<option value="${s.名稱}">${s.名稱}</option>`).join('');
            
            document.getElementById('page-notices').innerHTML = appData.rules.map(r => `
                <div class="bg-white p-4 rounded-xl border-l-4 border-pink-500 shadow-sm"><h4 class="font-bold mb-1">${r.標題}</h4><p class="text-xs text-gray-500">${r.詳細內容}</p></div>`).join('');

            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const now = new Date();
            const year = now.getFullYear(), month = now.getMonth();
            document.getElementById('current-month').innerText = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const todayStr = Utilities_formatDate(now);

            let html = "";
            for (let j = 0; j < firstDay; j++) html += `<div class="calendar-day bg-gray-50/50"></div>`;

            for (let i = 1; i <= lastDate; i++) {
                const dStr = `${year}/${month + 1}/${i}`;
                const isPast = new Date(year, month, i+1) < now;
                
                const daySlots = appData.allSlots.filter(s => s.date === dStr);
                const slotsHtml = daySlots.map(s => {
                    let cls = 'status-off', txt = '休';
                    if (s.status === '可預約') { cls = 'status-ok'; txt = '可'; }
                    else if (s.status === '已約滿') { cls = 'status-full'; txt = '滿'; }
                    return `<div class="slot-row ${cls}">${s.time} ${txt}</div>`;
                }).join('');

                const hasAvail = daySlots.some(s => s.status === '可預約');

                html += `
                    <div onclick="${(isPast || !hasAvail) ? '' : `openModal('${dStr}')`}" class="calendar-day ${isPast ? 'past' : ''} ${dStr === todayStr ? 'today' : ''}">
                        <span class="day-num">${i}</span>
                        ${slotsHtml}
                    </div>`;
            }
            grid.innerHTML = html;
        }

        function openModal(dStr) {
            selDate = dStr; selTime = null;
            document.getElementById('modal-date-display').innerText = `預約日期：${dStr}`;
            const slots = appData.allSlots.filter(s => s.date === dStr);
            document.getElementById('time-options').innerHTML = slots.map(s => {
                const isAvail = s.status === '可預約';
                return `<button type="button" onclick="${isAvail ? `selectTime('${s.time}', this)` : ''}" 
                    class="py-3 rounded-xl border text-xs font-bold ${isAvail ? 'border-pink-200 text-pink-600' : 'bg-gray-100 text-gray-300'}">
                    ${s.time}<br>${s.status}</button>`;
            }).join('');
            document.getElementById('booking-modal').classList.remove('hidden');
        }

        function selectTime(t, el) {
            selTime = t;
            document.querySelectorAll('#time-options button').forEach(b => b.classList.remove('bg-pink-600', 'text-white'));
            el.classList.add('bg-pink-600', 'text-white');
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').classList.remove('opacity-50');
        }

        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "提交中...";
            
            const profile = await liff.getProfile();
            const payload = {
                action: 'submitBooking',
                userId: profile.userId, name: profile.displayName,
                date: selDate, time: selTime,
                style: document.getElementById('form-style').value,
                removeNails: document.getElementById('form-remove').checked ? "是" : "否"
            };

            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.text();

            if (result.includes("Success")) {
                alert("預約資料已送出，美甲師火速確認中！\n若預約成功會寄送通知。");
                liff.closeWindow();
            }
        }

        function closeModal() { document.getElementById('booking-modal').classList.add('hidden'); }
        function switchPage(p) {
            ['booking', 'notices', 'styles'].forEach(id => {
                document.getElementById(`page-${id}`).classList.toggle('hidden', id !== p);
                document.getElementById(`tab-${id}`).classList.toggle('active-tab', id === p);
            });
        }
        function Utilities_formatDate(d) { return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`; }
        window.onload = init;
    </script>
</body>
</html>
