<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Art Studio | 預約系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fffafb; -webkit-tap-highlight-color: transparent; }
        
        .marquee-container { background: #be185d; color: white; padding: 6px 0; overflow: hidden; white-space: nowrap; }
        .marquee-content { display: inline-block; animation: marquee 20s linear infinite; font-size: 14px; font-weight: bold; padding-left: 100%; }
        @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-200%); } }

        .nav-tag { padding: 8px 18px; border-radius: 50px; font-size: 14px; font-weight: 500; transition: all 0.3s; border: 1px solid #fce7f3; color: #9d174d; background: white; white-space: nowrap; }
        .nav-tag.active { background: #be185d; color: white; border-color: #be185d; box-shadow: 0 4px 10px rgba(190, 24, 93, 0.15); }
        .calendar-card { background: white; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.02); border: 1px solid #fce7f3; padding: 15px; }
        .calendar-day { min-height: 90px; border-radius: 12px; border: 1px solid transparent; display: flex; flex-direction: column; align-items: center; padding: 6px 2px; transition: all 0.2s; }
        .day-num { font-size: 14px; font-weight: 600; color: #374151; }
        .slot-text { font-size: 10px; color: #be185d; margin-top: 1px; font-weight: 600; transform: scale(0.9); pointer-events: none; }
        .has-slots { cursor: pointer; background: #fffcfd; border-color: #fff1f2; }
        .today-mark { border: 2px solid #be185d !important; }
        .past-day { opacity: 0.5; cursor: default; }

        .line-btn { position: fixed; bottom: 20px; right: 20px; background: #06C755; color: white; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 90; }

        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <div class="marquee-container" id="marquee-box">
        <div class="marquee-content" id="marquee-text">✨ 歡迎光臨！載入最新公告中... ✨</div>
    </div>

    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-pink-50">
        <div onclick="window.location.reload();" class="flex items-center gap-2 cursor-pointer">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-rose-700 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-sparkles text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-gray-800 leading-none text-lg">Nail Studio</h1>
                <p class="text-[10px] text-pink-500 font-bold uppercase tracking-widest">Booking</p>
            </div>
        </div>
        <img id="user-avatar" class="w-10 h-10 rounded-full border-2 border-pink-100 hidden">
    </header>

    <nav class="flex gap-3 px-6 py-4 overflow-x-auto no-scrollbar">
        <button onclick="switchPage('booking')" id="tab-booking" class="nav-tag active">預約時段</button>
        <button onclick="switchPage('promo')" id="tab-promo" class="nav-tag">活動與公告</button>
        <button onclick="switchPage('styles')" id="tab-styles" class="nav-tag">款式介紹</button>
        <button onclick="switchPage('notices')" id="tab-notices" class="nav-tag">預約須知</button>
    </nav>

    <main class="max-w-md mx-auto px-4">
        <section id="page-booking" class="page-content">
            <div class="calendar-card">
                <div class="flex justify-between items-center mb-6 px-2">
                    <h2 id="current-month" class="text-xl font-bold text-gray-800"></h2>
                    <div class="flex gap-4">
                        <button onclick="changeMonth(-1)" class="w-8 h-8 text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
                        <button onclick="changeMonth(1)" class="w-8 h-8 text-gray-400"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="grid grid-cols-7 text-center mb-2 text-[10px] font-bold text-gray-300 uppercase tracking-widest">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
            </div>
        </section>

        <section id="page-promo" class="page-content hidden space-y-4">
            <div id="promo-list" class="space-y-4"></div>
        </section>

        <section id="page-styles" class="page-content hidden">
            <div id="styles-grid" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="page-notices" class="page-content hidden space-y-4"></section>
    </main>

    <a href="https://line.me/ti/p/@您的ID" target="_blank" class="line-btn">
        <i class="fa-brands fa-line"></i>
    </a>

    <div id="booking-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 modal-up shadow-2xl overflow-y-auto max-h-[85vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-800">預約詳情</h3>
                <button onclick="closeModal()" class="w-10 h-10 bg-gray-50 rounded-full text-gray-400 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="display-date" class="bg-pink-50 text-pink-700 font-bold py-4 rounded-2xl text-center mb-8"></div>
            <form onsubmit="submitForm(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-3 ml-1">選擇時段</label>
                    <div id="time-options" class="grid grid-cols-3 gap-3"></div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-3 ml-1">選擇款式</label>
                    <select id="form-style" required class="w-full bg-gray-50 border border-gray-100 rounded-2xl p-4 font-bold text-gray-700 outline-none"></select>
                </div>
                <div class="flex items-center justify-between bg-gray-50 p-5 rounded-2xl border border-gray-100">
                    <span class="font-bold text-gray-700">需卸甲 (+$200)</span>
                    <input type="checkbox" id="form-remove" class="w-6 h-6 accent-pink-600">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2 ml-1">備註 (選填)</label>
                    <textarea id="form-note" class="w-full bg-gray-50 border border-gray-100 rounded-2xl p-4 text-sm" placeholder="如果有特別需求請註明..."></textarea>
                </div>
                <button type="submit" id="submit-btn" disabled class="w-full bg-gray-900 text-white py-5 rounded-3xl font-bold text-lg shadow-xl disabled:opacity-30">確認預約</button>
            </form>
        </div>
    </div>

    <script>
        // 1. 這裡請更換為您部署後的最新 GAS 網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzpHiu_LELbrZMiiwvQYM_3EATq_sbhCr_TfX8IpwSffkWAmKCrcmZfDA2Suc-hDelb/exec"; 
        const LIFF_ID = "2009547519-PsSaE7hv";
        
        let appData = { settings: [], styles: [], rules: [], promos: [] };
        let viewDate = new Date();
        let selDate, selTime;

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                document.getElementById('user-avatar').src = profile.pictureUrl;
                document.getElementById('user-avatar').classList.remove('hidden');
            } catch (e) { console.log("LIFF failed or running in browser"); }
            fetchData();
        }

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?action=getAppData`);
                appData = await res.json();
                renderUI();
            } catch (e) { console.error("Fetch Data Error:", e); }
        }

        function renderUI() {
            // 跑馬燈
            const marqueeText = appData.promos.map(p => `📢 ${p.類型}: ${p.內容}`).join(' ｜ ');
            document.getElementById('marquee-text').innerText = marqueeText || "✨ 歡迎光臨美甲工作室 ✨";

            // 公告列表
            document.getElementById('promo-list').innerHTML = appData.promos.map(p => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border-l-4 border-pink-500">
                    <span class="bg-pink-100 text-pink-600 text-[10px] px-2 py-1 rounded-full font-bold uppercase">${p.類型}</span>
                    <h4 class="font-bold text-gray-800 mt-2 text-lg">${p.內容}</h4>
                </div>
            `).join('');

            // 款式介紹
            document.getElementById('styles-grid').innerHTML = appData.styles.map(s => `
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-pink-50 text-center pb-2">
                    <img src="${s.圖片網址}" class="w-full h-32 object-cover">
                    <div class="p-2"><p class="font-bold text-xs truncate">${s.名稱}</p><p class="text-pink-600 font-bold text-xs">$${s.價格}</p></div>
                </div>
            `).join('');
            
            // 款式下拉選單
            document.getElementById('form-style').innerHTML = '<option value="" disabled selected>請選擇款式</option>' + 
                appData.styles.map(s => `<option value="${s.名稱}">${s.名稱}</option>`).join('');

            // 預約須知
            document.getElementById('page-notices').innerHTML = appData.rules.map(r => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-pink-50">
                    <h4 class="font-bold text-pink-700 mb-2 flex items-center gap-2"><i class="fa-solid fa-star text-[10px]"></i>${r.標題}</h4>
                    <p class="text-sm text-gray-500 leading-relaxed">${r.詳細內容}</p>
                </div>
            `).join('');
            
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            document.getElementById('current-month').innerText = `${year}年 ${month + 1}月`;
            grid.innerHTML = "";
            
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const today = new Date(); today.setHours(0, 0, 0, 0);

            for (let j = 0; j < firstDay; j++) grid.innerHTML += `<div></div>`;
            
            for (let i = 1; i <= lastDate; i++) {
                const dObj = new Date(year, month, i);
                const dStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const isPast = dObj < today;
                
                const match = appData.settings.find(s => s.formattedDate === dStr);
                const slots = match ? match.availableSlots : [];
                
                const dayDiv = document.createElement('div');
                dayDiv.className = `calendar-day ${isPast ? 'past-day' : (slots.length > 0 ? 'has-slots' : '')} ${dObj.getTime() === today.getTime() ? 'today-mark' : ''}`;
                
                let html = `<span class="day-num">${i}</span>`;
                if (!isPast) { 
                    slots.forEach(s => { html += `<div class="slot-text">${s}</div>`; }); 
                }
                dayDiv.innerHTML = html;
                
                if (slots.length > 0 && !isPast) { 
                    dayDiv.onclick = () => openModal(dStr, slots); 
                }
                grid.appendChild(dayDiv);
            }
        }

        function openModal(dStr, slots) {
            selDate = dStr; selTime = null;
            document.getElementById('display-date').innerText = `預約日期：${dStr}`;
            document.getElementById('time-options').innerHTML = slots.map(t => `
                <button type="button" onclick="selectTime('${t}', this)" class="time-btn py-4 rounded-2xl border border-gray-100 text-gray-700 font-bold bg-gray-50 text-sm">${t}</button>
            `).join('');
            document.getElementById('booking-modal').classList.remove('hidden');
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').classList.add('opacity-30');
        }

        function selectTime(t, el) {
            selTime = t;
            document.querySelectorAll('.time-btn').forEach(b => {
                b.className = "time-btn py-4 rounded-2xl border border-gray-100 text-gray-700 font-bold bg-gray-50 text-sm";
            });
            el.className = "time-btn py-4 rounded-2xl border border-pink-500 text-white font-bold bg-pink-500 shadow-md text-sm";
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').classList.remove('opacity-30');
        }

        function closeModal() { document.getElementById('booking-modal').classList.add('hidden'); }

        async function submitForm(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>提交中...';

            try {
                let userId = "Unknown", displayName = "Guest";
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    userId = profile.userId;
                    displayName = profile.displayName;
                }

                const payload = {
                    action: 'submitBooking',
                    userId: userId,
                    name: displayName,
                    date: selDate,
                    time: selTime,
                    style: document.getElementById('form-style').value,
                    removeNails: document.getElementById('form-remove').checked ? "是" : "否",
                    note: document.getElementById('form-note').value
                };

                // 使用 no-cors 模式確保請求發送且不被跨域攔截
                await fetch(GAS_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(payload) 
                });

                // 因為 no-cors 無法獲得回傳內容，我們直接顯示成功並關閉
                setTimeout(() => {
                    closeModal();
                    alert("預約資料已送出，美甲師火速確認中！\n若預約成功會寄送通知喔 ❤️");
                    liff.closeWindow();
                }, 1000);

            } catch (err) {
                console.error("Submit Error:", err);
                alert("提交失敗，請私訊美甲師或檢查網路。");
                btn.disabled = false;
                btn.innerHTML = "確認預約";
            }
        }

        function switchPage(p) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.querySelectorAll('.nav-tag').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${p}`).classList.add('active');
        }

        function changeMonth(step) {
            viewDate.setMonth(viewDate.getMonth() + step);
            renderCalendar();
        }

        window.onload = init;
    </script>
</body>
</html>
