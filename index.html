<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Studio | 預約看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #db2777; border-bottom: 3px solid #db2777; font-weight: bold; }
        .calendar-day { min-height: 105px; background: white; border: 0.5px solid #f3f4f6; display: flex; flex-direction: column; align-items: center; padding: 6px 2px; cursor: pointer; }
        .day-num { font-size: 14px; font-weight: bold; color: #4b5563; margin-bottom: 4px; }
        .slot-row { width: 100%; font-size: 10px; text-align: center; line-height: 1.5; font-weight: 600; }
        
        .status-ok { color: #db2777; }    /* 可預約：粉色 */
        .status-full { color: #9ca3af; }  /* 已約滿：灰色 */
        .status-off { color: #ef4444; }   /* 休假：紅色 */

        .calendar-day.past { background-color: #f9fafb; cursor: default; opacity: 0.6; }
        .calendar-day.empty { background-color: #fafafa; cursor: default; }
        .calendar-day.today { outline: 2px solid #db2777; outline-offset: -2px; z-index: 10; border-radius: 4px; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 pb-10">

    <header class="bg-white px-5 py-3 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-pink-600 rounded-lg flex items-center justify-center text-white italic font-bold text-xl shadow-md">N</div>
            <span class="font-bold text-lg tracking-wider text-gray-800 uppercase">Nail Studio</span>
        </div>
        <img id="user-avatar" src="" class="w-10 h-10 rounded-full hidden border-2 border-pink-100">
    </header>

    <nav class="bg-white border-b flex text-center sticky top-[60px] z-40">
        <button onclick="switchPage('booking')" id="tab-booking" class="flex-1 py-4 active-tab text-sm">預約看板</button>
        <button onclick="switchPage('notices')" id="tab-notices" class="flex-1 py-4 text-gray-500 text-sm">預約須知</button>
        <button onclick="switchPage('styles')" id="tab-styles" class="flex-1 py-4 text-gray-500 text-sm">活動款式</button>
    </nav>

    <main class="max-w-md mx-auto p-2">
        <section id="page-booking">
            <div class="bg-white rounded-3xl p-4 shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 id="current-month" class="font-bold text-gray-700">載入中...</h2>
                    <div class="text-[10px] flex gap-2">
                        <span class="status-ok">●可約</span><span class="status-full">●滿</span><span class="status-off">●休</span>
                    </div>
                </div>
                <div class="grid grid-cols-7 text-center text-xs mb-2 text-gray-400 font-bold">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-px bg-gray-100 border border-gray-100 rounded-xl overflow-hidden"></div>
            </div>
        </section>

        <section id="page-notices" class="hidden space-y-4"></section>
        <section id="page-styles" class="hidden space-y-4">
            <div id="styles-grid" class="grid grid-cols-2 gap-4"></div>
        </section>
    </main>

    <div id="booking-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 animate-slide-up shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">選擇時段</h3>
                <button onclick="closeModal()" class="text-gray-400 text-2xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form class="space-y-6" onsubmit="submitForm(event)">
                <div id="modal-date-display" class="bg-pink-50 p-4 rounded-2xl text-pink-700 font-bold text-center"></div>
                <div id="time-options" class="grid grid-cols-3 gap-3"></div>
                <select id="form-style" required class="w-full bg-gray-50 border-none rounded-2xl p-4"></select>
                <div class="flex items-center justify-between bg-gray-50 p-4 rounded-2xl font-bold text-gray-700">
                    <span>需卸甲 ($200)</span>
                    <input type="checkbox" id="form-remove" class="w-6 h-6 accent-pink-600">
                </div>
                <button type="submit" id="submit-btn" disabled class="w-full bg-gray-900 text-white py-5 rounded-3xl font-bold opacity-50">確認預約</button>
            </form>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwOu1lc0eXwa8Pph6fU4rkJIAbcgm1ej8wVTgJst3LJYu4XAvrgLdp21V3QTnSUs2gH/exec";
        const LIFF_ID = "2009547519-PsSaE7hv";
        let appData = { allSlots: [], styles: [], rules: [], promos: [] };
        let selDate, selTime;

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                if (profile.pictureUrl) {
                    document.getElementById('user-avatar').src = profile.pictureUrl;
                    document.getElementById('user-avatar').classList.remove('hidden');
                }
                fetchData();
            } catch (e) { fetchData(); } // 即使 LIFF 失敗也嘗試抓資料
        }

        async function fetchData() {
            try {
                const res = await fetch(`${GAS_URL}?action=getAppData`);
                const data = await res.json();
                // 容錯處理：確保 allSlots 一定是陣列
                appData.allSlots = data.allSlots || data.settings || [];
                appData.styles = data.styles || [];
                appData.rules = data.rules || [];
                renderUI();
            } catch (e) {
                console.error("Data Fetch Error", e);
                renderCalendar(); // 即使失敗也要畫出日曆
            }
        }

        function renderUI() {
            // 款式
            document.getElementById('styles-grid').innerHTML = appData.styles.map(s => `
                <div class="bg-white rounded-xl overflow-hidden shadow-sm border border-gray-100 text-center pb-2">
                    <img src="${s.圖片網址}" class="w-full h-32 object-cover">
                    <p class="font-bold text-xs mt-2">${s.名稱}</p>
                    <p class="text-pink-600 text-xs font-bold">$${s.價格}</p>
                </div>
            `).join('');
            document.getElementById('form-style').innerHTML = appData.styles.map(s => `<option value="${s.名稱}">${s.名稱}</option>`).join('');
            
            // 須知
            document.getElementById('notices-content').innerHTML = appData.rules.map(r => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-pink-500 mb-3">
                    <h4 class="font-bold text-gray-800 mb-1">${r.標題}</h4>
                    <p class="text-sm text-gray-500">${r.詳細內容}</p>
                </div>
            `).join('');

            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            document.getElementById('current-month').innerText = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const today = new Date(); today.setHours(0,0,0,0);

            let html = "";
            for (let j = 0; j < firstDay; j++) html += `<div class="calendar-day empty"></div>`;

            for (let i = 1; i <= lastDate; i++) {
                const d = new Date(year, month, i);
                const isPast = d < today;
                const dStr = `${year}/${month + 1}/${i}`;
                
                // 抓取該日期的三個時段資料
                const slotsHtml = ['10:00', '14:00', '19:00'].map(t => {
                    const match = appData.allSlots.find(s => {
                        const sd = new Date(s.date || s.formattedDate);
                        return sd.getDate() === i && sd.getMonth() === month && String(s.time || s.slot || "").includes(t);
                    });
                    
                    const status = match ? String(match.status).trim() : '休假';
                    let cls = 'status-off', txt = '休';
                    if (status === '可預約') { cls = 'status-ok'; txt = '可'; }
                    else if (status === '已約滿') { cls = 'status-full'; txt = '滿'; }
                    return `<div class="slot-row ${cls}">${t} ${txt}</div>`;
                }).join('');

                html += `
                    <div onclick="${isPast ? '' : `openModal('${dStr}', ${i})`}" class="calendar-day ${isPast ? 'past' : ''} ${d.getTime() === today.getTime() ? 'today' : ''}">
                        <span class="day-num">${i}</span>
                        ${slotsHtml}
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        function openModal(dStr, dayNum) {
            selDate = dStr; selTime = null;
            document.getElementById('modal-date-display').innerText = `📅 ${dStr}`;
            
            const times = ['10:00', '14:00', '19:00'];
            const container = document.getElementById('time-options');
            
            container.innerHTML = times.map(t => {
                const match = appData.allSlots.find(s => {
                    const sd = new Date(s.date || s.formattedDate);
                    return sd.getDate() === dayNum && String(s.time || s.slot || "").includes(t);
                });
                const isAvail = match && String(match.status).trim() === '可預約';
                const statusTxt = match ? String(match.status).trim() : '休假';

                return `
                    <button type="button" onclick="${isAvail ? `selectTime('${t}', this)` : ''}" 
                        class="py-4 rounded-2xl border text-sm font-bold ${isAvail ? 'border-pink-200 text-pink-600' : 'bg-gray-100 text-gray-300 border-transparent'}">
                        ${t}<br><span class="text-[10px]">${isAvail ? '可預約' : (statusTxt === '已約滿' ? '已滿' : '休假')}</span>
                    </button>
                `;
            }).join('');
            
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').classList.add('opacity-50');
            document.getElementById('booking-modal').classList.remove('hidden');
        }

        function selectTime(t, el) {
            selTime = t;
            document.querySelectorAll('#time-options button').forEach(b => b.classList.remove('bg-pink-600', 'text-white'));
            el.classList.add('bg-pink-600', 'text-white');
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').classList.remove('opacity-50');
        }

        function closeModal() { document.getElementById('booking-modal').classList.add('hidden'); }

        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "傳送中...";
            const profile = await liff.getProfile();
            const payload = {
                action: 'submitBooking',
                userId: profile.userId, name: profile.displayName,
                date: selDate, time: selTime,
                style: document.getElementById('form-style').value,
                removeNails: document.getElementById('form-remove').checked ? "是" : "否"
            };
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            await liff.sendMessages([{ type: 'text', text: `✅ 預約成功！\n日期：${selDate}\n時間：${selTime}` }]);
            liff.closeWindow();
        }

        function switchPage(p) {
            ['booking', 'notices', 'styles'].forEach(id => {
                document.getElementById(`page-${id}`).classList.toggle('hidden', id !== p);
                document.getElementById(`tab-${id}`).classList.toggle('active-tab', id === p);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
